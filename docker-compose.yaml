services:
  healthcheck:
    build:
      context: ../go-health-checker-for-services
      dockerfile: Dockerfile
    container_name: healthcheck
    ports:
      - "8000:8000"
    restart: always

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dobrofon_dev_bot
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - healthcheck
    restart: always
